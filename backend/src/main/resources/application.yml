spring:
  application:
    name: sre-dashboard-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sre_dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:sre_user}
    password: ${SPRING_DATASOURCE_PASSWORD:sre_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

app:
  environment: ${APP_ENVIRONMENT:DEVELOPMENT}
  version: '@project.version@'
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: SRE Operations Dashboard
    description: Dashboard de operacoes para gerenciamento de servicos monitorados
    version: '@project.version@'

logging:
  level:
    com.sre.dashboard: INFO
